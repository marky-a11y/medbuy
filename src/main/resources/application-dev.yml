server:
  address: 0.0.0.0

spring:
  datasource:
    url: jdbc:h2:mem:mediabuying;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    # Override base Hikari pool settings for dev (tiny pool, fast timeout)
    hikari:
      connection-timeout: 5000
      idle-timeout: 300000
      maximum-pool-size: 5
      minimum-idle: 1

  h2:
    console:
      enabled: true
      path: /h2-console

  # Flyway is on the classpath but disabled — we use ddl-auto + import.sql instead
  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    # Seed data is handled by import.sql via Hibernate's native bootstrap
    # mechanism — no need for defer-datasource-initialization or sql.init.mode.
    # import.sql runs automatically after Hibernate DDL for CREATE actions.
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        # Ensure the media_buying schema is created automatically from
        # @Table(schema = "media_buying") annotations during ddl-auto:update.
        hbm2ddl:
          create_namespaces: true
          # NOTE: import_files is NOT set here because:
          # 1) ddl-auto:update uses SchemaMigrator (not SchemaCreator), so
          #    import files are never executed for the UPDATE action.
          # 2) Hibernate's default /import.sql classpath scan is sufficient.
          # 3) Explicitly setting it caused a hang in some Railway builds
          #    (possibly a classloader deadlock in the fat JAR).
        # Prevent Hibernate from hanging on JDBC metadata retrieval during
        # SessionFactory creation.  With H2 in PostgreSQL mode, some metadata
        # queries may block indefinitely; this setting skips them.
        temp:
          use_jdbc_metadata_defaults: false

  # Seed data via import.sql (Hibernate-native).  Spring's DataSourceInitializer
  # is explicitly disabled to avoid SmartInitializingSingleton issues on Railway.
  sql:
    init:
      mode: never

  thymeleaf:
    cache: false

  # In-memory session (no external store needed)
  session:
    store-type: none

  # Prevent scheduled tasks from starving the main thread during startup.
  # One thread for the first @Scheduled task, a second for any others.
  task:
    scheduling:
      pool:
        size: 2

# Disable integration ingestion in dev (no external APIs to call)
integration:
  ingestion:
    enabled: false
    interval-ms: 300000
    timeout-seconds: 300
  iheart-radio:
    mock-enabled: true

logging:
  level:
    # Your application code — keep at DEBUG for development
    com.autoresolve.mediabuying: DEBUG
    com.autoresolve.mediabuying.integration: DEBUG
    # Keep Hibernate/Hikari at INFO or WARN to avoid log rate limits on Railway.
    # The TRACE levels were needed earlier to diagnose a Hibernate hang;
    # that issue is resolved, so revert to normal levels.
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
    org.springframework.boot.autoconfigure: WARN
    org.springframework.boot.autoconfigure.jdbc: INFO
    org.springframework.orm.jpa: WARN
    # org.springframework.web: DEBUG   # Uncomment if you need to debug health-check routing
