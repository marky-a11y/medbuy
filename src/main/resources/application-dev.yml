server:
  address: 0.0.0.0

spring:
  # Lazy initialization defers bean creation until first use — saves ~50MB
  # at startup by not creating beans the dashboard never touches.
  main:
    lazy-initialization: true

  datasource:
    # H2 memory tuning: CACHE_SIZE=4096 (4MB page cache), LOCK_MODE=0 (no locking)
    url: jdbc:h2:mem:mediabuying;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CACHE_SIZE=4096;LOCK_MODE=0
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      connection-timeout: 5000
      idle-timeout: 60000
      maximum-pool-size: 1
      minimum-idle: 0

  h2:
    console:
      enabled: false

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        hbm2ddl:
          create_namespaces: true
        temp:
          use_jdbc_metadata_defaults: false
        # Disable second-level cache (saves memory)
        cache:
          use_second_level_cache: false
          use_query_cache: false
        # Disable statistics collection
        generate_statistics: false
        # Reduce JDBC batch size (less memory per batch)
        jdbc:
          batch_size: 10
          batch_versioned_data: true
        order_inserts: true
        order_updates: true

  sql:
    init:
      mode: never

  thymeleaf:
    cache: true

  session:
    store-type: none

  task:
    scheduling:
      pool:
        size: 1

  # JSF / PrimeFaces (Joinfaces) — Production stage disables debug checks
  # and view-state encryption validation that consume heap on every request.
  joinfaces:
    faces:
      project-stage: Production

integration:
  ingestion:
    enabled: true
    interval-ms: 300000
    timeout-seconds: 300
  iheart-radio:
    mock-enabled: true

logging:
  level:
    com.autoresolve.mediabuying: WARN
    com.autoresolve.mediabuying.integration: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
    org.springframework: WARN
