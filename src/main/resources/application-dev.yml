server:
  address: 0.0.0.0

spring:
  datasource:
    url: jdbc:h2:mem:mediabuying;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    # Override base Hikari pool settings for dev (tiny pool, fast timeout)
    hikari:
      connection-timeout: 5000
      idle-timeout: 300000
      maximum-pool-size: 5
      minimum-idle: 1

  h2:
    console:
      enabled: true
      path: /h2-console

  # Flyway is on the classpath but disabled — we use ddl-auto + import.sql instead
  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        hbm2ddl:
          create_namespaces: true
        temp:
          use_jdbc_metadata_defaults: false

  sql:
    init:
      mode: never

  thymeleaf:
    cache: false

  # In-memory session (no external store needed)
  session:
    store-type: none

  # Prevent scheduled tasks from starving the main thread during startup.
  # One thread for the first @Scheduled task, a second for any others.
  task:
    scheduling:
      pool:
        size: 2

# Disable integration ingestion in dev (no external APIs to call)
integration:
  ingestion:
    enabled: false
    interval-ms: 300000
    timeout-seconds: 300
  iheart-radio:
    mock-enabled: true

logging:
  level:
    com.autoresolve.mediabuying: INFO
    com.autoresolve.mediabuying.integration: INFO
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
    org.springframework.boot.autoconfigure: WARN
    org.springframework.boot.autoconfigure.jdbc: WARN
    org.springframework.orm.jpa: WARN
