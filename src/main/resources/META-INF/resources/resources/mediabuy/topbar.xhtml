<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:cc="http://xmlns.jcp.org/jsf/composite"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<cc:interface>
    <cc:attribute name="showSectorFilter" type="java.lang.Boolean" default="true"/>
</cc:interface>

<cc:implementation>
    <header class="topbar">
        <div class="topbar-left">
            <!-- Search (disabled) -->
            <div class="search-bar">
                <span class="material-symbols-outlined search-icon">search</span>
                <input type="text" placeholder="Search campaigns..." aria-label="Search campaigns" disabled="disabled"/>
            </div>

            <!-- Sector Filter -->
            <div class="sector-filter-wrapper" rendered="#{cc.attrs.showSectorFilter}">
                <p:selectOneMenu value="#{sectorFilterBean.selectedSectorId}"
                                 styleClass="sector-filter-select"
                                 onchange="window.location.href='/dashboard.xhtml?sector=' + this.value">
                    <f:selectItem itemLabel="All Sectors" itemValue="#{null}"/>
                    <f:selectItems value="#{sectorFilterBean.sectors}"
                                   var="s"
                                   itemLabel="#{s.displayName}"
                                   itemValue="#{s.id}"/>
                </p:selectOneMenu>
                <span class="material-symbols-outlined sector-filter-arrow">expand_more</span>
            </div>
        </div>

        <div class="topbar-right">
            <!-- Data Refresh Status -->
            <div class="refresh-status">
                <span class="material-symbols-outlined" style="font-size: var(--font-size-sm);">schedule</span>
                <span>Data refreshed <h:outputText value="#{dashboardBean.minutesSinceRefresh}"/> minutes ago</span>
            </div>

            <!-- Icon Buttons -->
            <button class="topbar-icon-btn" title="Notifications" type="button">
                <span class="material-symbols-outlined">notifications</span>
            </button>
            <p:commandButton styleClass="topbar-icon-btn"
                             title="Refresh"
                             actionListener="#{dashboardBean.manualRefresh()}"
                             update="@form"
                             icon="pi pi-refresh"
                             process="@this"/>
            <button class="topbar-icon-btn" title="Filter" type="button">
                <span class="material-symbols-outlined">filter_alt</span>
            </button>

            <div class="topbar-divider"></div>

            <!-- User Profile -->
            <div class="user-profile">
                <div class="user-info">
                    <p class="user-name">Alex Rivera</p>
                    <p class="user-role">Senior Media Buyer</p>
                </div>
                <img class="user-avatar"
                     src="https://ui-avatars.com/api/?name=Alex+Rivera&amp;background=2563eb&amp;color=fff&amp;size=80"
                     alt="Alex Rivera"/>
            </div>
        </div>
    </header>
</cc:implementation>
</html>
