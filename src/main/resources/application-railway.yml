# ============================================================================
# Railway profile — overrides the base PostgreSQL datasource with an H2
# in-memory database running in PostgreSQL compatibility mode.
#
# Activate with:   SPRING_PROFILES_ACTIVE=railway  (env var on Railway)
#                  --spring.profiles.active=railway (CLI / start.sh)
# ============================================================================
spring:
  datasource:
    url: jdbc:h2:mem:mediabuying;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    schemas: media_buying
