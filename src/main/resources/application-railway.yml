# ------------------------------------------------------------------------------
# Railway Deployment Profile
#
# Activate this profile on Railway by setting the environment variable:
#   SPRING_PROFILES_ACTIVE=railway
#
# Uses H2 in-memory database (PostgreSQL compatibility mode), so no external
# database is required. All data is ephemeral — lost on restart.
# ------------------------------------------------------------------------------

server:
  address: 0.0.0.0

spring:
  datasource:
    url: jdbc:h2:mem:mediabuying;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        temp.use_jdbc_metadata_defaults: false
        hbm2ddl.auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Thymeleaf caching on for production
  thymeleaf:
    cache: true

logging:
  level:
    com.autoresolve.mediabuying: INFO
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
