<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:mediabuy="http://xmlns.jcp.org/jsf/composite/mediabuy">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MedBuy - Media Buying Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard-theme.css"/>
    <!-- Google Fonts: Inter -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap"/>
    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"/>
    <ui:insert name="head"/>
</h:head>
<h:body styleClass="bg-surface">
    <h:form id="mainForm" prependId="false">
    <ui:insert name="sidebar">
        <mediabuy:sidebar activePage="#{param.page != null ? param.page : 'dashboard'}"/>
    </ui:insert>

    <ui:insert name="topbar">
        <mediabuy:topbar showSectorFilter="true"/>
    </ui:insert>

    <main class="main-content">
        <div style="margin-bottom: var(--spacing-md);">
            <h:outputLink value="/project-info.xhtml" style="color: var(--primary); font-size: var(--font-size-sm); font-weight: 500; text-decoration: underline;">
                Information about the project
            </h:outputLink>
        </div>
        <ui:insert name="content"/>
    </main>

    <ui:insert name="fab">
        <p:commandButton styleClass="fab-button"
                         icon="pi pi-android"
                         title="AI Assistant — coming soon"
                         actionListener="#{dashboardBean.fabAction()}"/>
    </ui:insert>
    </h:form>

    <ui:insert name="scripts"/>
</h:body>
</html>
