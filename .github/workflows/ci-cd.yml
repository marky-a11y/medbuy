# ------------------------------------------------------------------------------
# Media Buying Dashboard - CI/CD Pipeline
#
# Stages:
#   1. Build & Test (Maven, SonarQube, Checkstyle)
#   2. Docker Build & Push to ECR
#   3. Deploy to Dev (auto on main)
#   4. Deploy to Staging (manual approval)
#   5. Deploy to Prod (manual approval)
# ------------------------------------------------------------------------------

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: media-buying-dashboard
  KUBERNETES_VERSION: "1.31"
  HELM_VERSION: "3.14.0"

jobs:

  # ============================================================================
  # Stage 1: Build & Test
  # ============================================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and run tests
        run: mvn clean verify -B
        env:
          MAVEN_OPTS: "-Dmaven.test.failure.ignore=false"

      - name: Run Checkstyle
        run: mvn checkstyle:check -B

      - name: Run SpotBugs
        run: mvn spotbugs:check -B

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          args: >
            -Dsonar.projectKey=autoresolve_media-buying-dashboard
            -Dsonar.organization=autoresolve
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.java.binaries=target/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.qualitygate.wait=true

      - name: Save build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  # ============================================================================
  # Stage 2: Docker Build & Push
  # ============================================================================
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image tag
        run: |
          echo "IMAGE_TAG=${{ steps.meta.outputs.version }}" >> $GITHUB_ENV

    outputs:
      image_tag: ${{ env.IMAGE_TAG }}

  # ============================================================================
  # Stage 3: Deploy to Dev (automatic on main)
  # ============================================================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: github.ref == 'refs/heads/main'
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} \
            --name media-buying-dev-eks

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Deploy to Dev with Helm
        run: |
          helm upgrade --install media-buying-dashboard \
            ./helm/media-buying-dashboard \
            --namespace media-buying \
            --create-namespace \
            --values ./helm/media-buying-dashboard/values-dev.yaml \
            --set image.tag=${{ needs.docker-build-push.outputs.image_tag }} \
            --set global.environment=dev \
            --wait \
            --timeout 5m

      - name: Verify deployment health
        run: |
          kubectl rollout status deployment/media-buying-dashboard \
            -n media-buying --timeout=3m

      - name: Run smoke tests
        run: |
          # Health check
          kubectl run smoke-test --image=curlimages/curl:8.5.0 \
            -n media-buying --rm -i --restart=Never -- \
            curl -s http://media-buying-dashboard:8080/actuator/health | grep -q '"status":"UP"'
          echo "Health check passed"

      - name: Notify Slack
        uses: rtCamp/action-slack-notify@v2
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_TITLE: "Dev Deployment: ${{ job.status }}"
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}

  # ============================================================================
  # Stage 4: Deploy to Staging (manual approval)
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
    # Manual approval is configured via GitHub Environments protection rules

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} \
            --name media-buying-staging-eks

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Deploy to Staging with Helm
        run: |
          helm upgrade --install media-buying-dashboard \
            ./helm/media-buying-dashboard \
            --namespace media-buying \
            --create-namespace \
            --values ./helm/media-buying-dashboard/values-staging.yaml \
            --set image.tag=${{ needs.docker-build-push.outputs.image_tag }} \
            --set global.environment=staging \
            --wait \
            --timeout 5m

      - name: Run integration tests
        run: |
          echo "Running integration tests..."
          # Integration tests would be triggered here (e.g., Playwright)

  # ============================================================================
  # Stage 5: Deploy to Prod (manual approval)
  # ============================================================================
  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: prod
    # Manual approval is configured via GitHub Environments protection rules

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} \
            --name media-buying-prod-eks

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Canary deployment (10% traffic)
        run: |
          # Deploy with canary label
          helm upgrade --install media-buying-dashboard \
            ./helm/media-buying-dashboard \
            --namespace media-buying \
            --create-namespace \
            --values ./helm/media-buying-dashboard/values-prod.yaml \
            --set image.tag=${{ needs.docker-build-push.outputs.image_tag }} \
            --set global.environment=prod \
            --set autoscaling.minReplicas=1 \
            --set autoscaling.maxReplicas=1 \
            --wait \
            --timeout 10m

      - name: Full rollout to production
        run: |
          # Scale to full production replicas
          kubectl scale deployment/media-buying-dashboard \
            -n media-buying --replicas=3

      - name: Verify production deployment
        run: |
          kubectl rollout status deployment/media-buying-dashboard \
            -n media-buying --timeout=5m

      - name: Run post-deployment smoke tests
        run: |
          # Check ALB endpoint health
          ALB_DNS=$(kubectl get ingress media-buying-dashboard \
            -n media-buying -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -s https://$ALB_DNS/actuator/health | grep -q '"status":"UP"'
          echo "Production health check passed"

      - name: Notify Slack
        uses: rtCamp/action-slack-notify@v2
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: deployments
          SLACK_TITLE: "Prod Deployment: ${{ job.status }}"
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}

  # ============================================================================
  # Security Scan (runs on every PR)
  # ============================================================================
  security-scan:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: OWASP ZAP Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ secrets.ZAP_TARGET_URL || 'http://localhost:8080' }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          cmd_options: '-a -j'
          fail_action: true
