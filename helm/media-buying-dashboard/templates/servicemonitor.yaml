{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "media-buying-dashboard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "media-buying-dashboard.labels" . | nindent 4 }}
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      {{- include "media-buying-dashboard.selectorLabels" . | nindent 6 }}
  podTargetLabels:
    - app.kubernetes.io/component
    - app.kubernetes.io/name
    - app.kubernetes.io/instance
  endpoints:
    - port: {{ .Values.serviceMonitor.port | default "http" }}
      interval: {{ .Values.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout | default "10s" }}
      path: {{ .Values.serviceMonitor.path | default "/actuator/prometheus" }}
      honorLabels: true
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
          targetLabel: component
          regex: (.+)
        # Support /actuator/prometheus path
        - sourceLabels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          targetLabel: __metrics_path__
          regex: (.+)
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
