# ------------------------------------------------------------------------------
# External Secrets Operator - ClusterSecretStore
# Configures ESO to read from AWS Secrets Manager and Parameter Store.
# ------------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
  labels:
    {{- include "media-buying-dashboard.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.global.region | default "us-east-1" }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "media-buying-dashboard.serviceAccountName" . }}
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-parameterstore
  labels:
    {{- include "media-buying-dashboard.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: ParameterStore
      region: {{ .Values.global.region | default "us-east-1" }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "media-buying-dashboard.serviceAccountName" . }}
